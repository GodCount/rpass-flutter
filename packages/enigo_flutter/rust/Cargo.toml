[package]
name = "enigo_flutter"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
enigo = "0.6.1"
flutter_rust_bridge = "=2.11.1"

[target.'cfg(target_os = "macos")'.dependencies.core-foundation]
version = "0.10"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(frb_expand)'] }